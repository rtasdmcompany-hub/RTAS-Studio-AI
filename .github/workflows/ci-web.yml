name: CI - RTAS Web

on:
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - "turbo.json"
      - "vercel.json"
      - "docs/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".npmrc"
      - "turbo.json"
      - "vercel.json"
      - "docs/**"
      - ".github/workflows/ci-web.yml"

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Smoke · Ready · Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .

    env:
      NEXTAUTH_SECRET: ci-build-placeholder-not-for-production-use-32chars
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PHASE: phase-production-build
      RTAS_ALLOW_INCOMPLETE_ENV: "1"
      # Prisma generate does not need a live DB; placeholder satisfies schema tooling.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rtas_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        # Workspace-scoped install + root typescript so hoisted @typescript-eslint/parser resolves.
        run: npm install --workspace=@rtas/web --include-workspace-root --legacy-peer-deps --no-audit --no-fund

      - name: Deployment-ready artifacts
        run: npm run verify:deployment-ready -w @rtas/web

      - name: ESLint
        run: npm run lint -w @rtas/web

      - name: Generate Prisma client
        # Required before tsc: @prisma/client exports (e.g. User) only exist after generate.
        run: npm run db:generate -w @rtas/web

      - name: TypeScript
        run: npm run typecheck -w @rtas/web

      - name: Commercial smoke tests
        run: npm run test -w @rtas/web

      - name: Production readiness checklist
        run: npm run verify:production -w @rtas/web

      - name: Production build
        run: npm run build -w @rtas/web
