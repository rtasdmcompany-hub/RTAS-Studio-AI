# Manual / documentation workflow — production deploy is Vercel-native.
# When credentials exist: add Vercel env + domain, then deploy from Vercel Dashboard
# or `vercel --prod`. This workflow only documents the gate and can be extended
# later with VERCEL_TOKEN repository secrets for automated promotion.
name: Deploy gate — RTAS Web

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type deploy-ready to acknowledge secrets+domain are configured in Vercel"
        required: true
        default: ""

jobs:
  gate:
    name: Pre-deploy confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install --workspace=@rtas/web --include-workspace-root --legacy-peer-deps --no-audit --no-fund

      - name: Verify deployment-ready artifacts
        run: npm run verify:deployment-ready -w @rtas/web

      - name: Confirm operator intent
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-ready" ]; then
            echo "Refusing: set confirm=deploy-ready after Vercel secrets + domain are configured."
            echo "See docs/DEPLOYMENT.md — 30-minute go-live sequence."
            exit 1
          fi
          echo "Operator confirmed. Deploy from Vercel Dashboard → Production, or:"
          echo "  npx vercel --prod"
          echo "Then smoke: GET /api/health and GET /api/ready"
