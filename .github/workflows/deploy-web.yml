# Optional: promote / redeploy via GitHub when Vercel secrets are configured.
# Primary CD path remains Vercel Git Integration (push to master -> Deploy).
# This workflow is for operators who prefer workflow_dispatch.
#
# Required GitHub Actions secrets (add when ready - not required for RC1):
#   VERCEL_TOKEN
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID
#
# Usage: Actions -> Deploy Web (manual) -> Run workflow -> select environment.
# Without secrets the job exits successfully with a skip notice (not a red failure).

name: Deploy Web (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Vercel environment to deploy
        required: true
        default: production
        type: choice
        options:
          - production
          - preview

concurrency:
  group: deploy-web-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Check Vercel secrets
        id: secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID."
            echo "RC1 uses Vercel Git Integration for deploys. Add secrets later for manual workflow deploys."
            echo "See docs/VERCEL-DEPLOY.md and docs/DEPLOYMENT.md."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.secrets.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        if: steps.secrets.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=${{ github.event.inputs.environment }} --token="$VERCEL_TOKEN"

      - name: Build
        if: steps.secrets.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel build ${{ github.event.inputs.environment == 'production' && '--prod' || '' }} --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt
        if: steps.secrets.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prebuilt ${{ github.event.inputs.environment == 'production' && '--prod' || '' }} --token="$VERCEL_TOKEN"
